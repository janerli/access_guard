input {
  kafka {
    bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}"
    topics => ["audit.events"]
    group_id => "logstash-audit"
    consumer_threads => 2
    auto_offset_reset => "earliest"
    codec => "json"
    decorate_events => true
  }
}

filter {
  # Set @timestamp from the Kafka envelope field occurred_at
  if [occurred_at] {
    date {
      match => ["occurred_at", "ISO8601"]
      target => "@timestamp"
    }
    mutate { add_field => { "timestamp" => "%{occurred_at}" } }
  }

  # Flatten audit-specific fields from payload to top level for ES mapping
  if [payload] {
    mutate {
      add_field => {
        "audit_log_id"    => "%{[payload][audit_log_id]}"
        "actor_id"        => "%{[payload][actor_id]}"
        "actor_username"  => "%{[payload][actor_username]}"
        "target_type"     => "%{[payload][target_type]}"
        "target_id"       => "%{[payload][target_id]}"
        "operation"       => "%{[payload][operation]}"
        "module"          => "%{[payload][module]}"
        "result"          => "%{[payload][result]}"
        "ip_address"      => "%{[payload][ip_address]}"
        "department_code" => "%{[payload][department_code]}"
        "position_code"   => "%{[payload][position_code]}"
      }
    }

    # Move nested details object to top level without stringifying
    if [payload][details] {
      mutate {
        rename => { "[payload][details]" => "details" }
      }
    }

    mutate { remove_field => ["payload"] }
  }

  mutate { remove_field => ["@version"] }
}

output {
  if "app-log" not in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_URL:http://elasticsearch:9200}"]
      index => "audit-events-%{+YYYY.MM}"
      document_id => "%{event_id}"
      action => "index"
    }
  }
}
