input {
  file {
    path => "/app/logs/app.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "plain"
    tags => ["app-log"]
  }
}

filter {
  json {
    source => "message"
    skip_on_invalid_json => true
  }

  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
    mutate { remove_field => ["timestamp"] }
  }

  mutate {
    remove_field => ["@version", "message"]
    add_field => { "service" => "accessguard" }
  }
}

output {
  if "app-log" in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_URL:http://elasticsearch:9200}"]
      index => "app-logs-%{+YYYY.MM}"
    }
  }
}
