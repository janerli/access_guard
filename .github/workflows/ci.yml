name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: accessguard
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: accessguard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://accessguard:secret@localhost:5432/accessguard_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret-key-32-characters-min
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      ELASTICSEARCH_URL: http://localhost:9200
      LDAP_URI: ldap://localhost:389
      LDAP_BASE_DN: dc=accessguard,dc=local
      LDAP_BIND_DN: cn=admin,dc=accessguard,dc=local
      LDAP_BIND_PASSWORD: admin
      HR_MOCK_URL: http://localhost:8001
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_FROM: noreply@accessguard.local

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70 \
            -v \
            tests/

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  frontend-lint:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8000

  docker-compose-check:
    name: Docker Compose Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for validation
        run: cp .env.example .env

      - name: Validate docker-compose.yml
        run: docker compose config --quiet
